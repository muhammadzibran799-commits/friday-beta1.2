<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friday</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background-color: #5a5a5a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARD ── */
    .chat-card {
      width: 780px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.38);
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    /* ── HEADER ── */
    .chat-header {
      background: #ffffff;
      padding: 18px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1.5px solid #e0e0e0;
      flex-shrink: 0;
    }

    .chat-header .title {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 0.01em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot {
      width: 11px;
      height: 11px;
      background-color: #5ecb6b;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
    }

    /* ── CHAT AREA ── */
    .chat-body {
      background: #e3e3e3;
      flex: 1;
      min-height: 430px;
      max-height: 430px;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* scrollbar subtle */
    .chat-body::-webkit-scrollbar {
      width: 5px;
    }
    .chat-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-body::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 10px;
    }

    /* ── BUBBLES ── */
    .bubble-row {
      display: flex;
      width: 100%;
    }

    .bubble-row.user {
      justify-content: flex-end;
    }

    .bubble-row.ai {
      justify-content: flex-start;
    }

    .bubble {
      background: #ffffff;
      border-radius: 50px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.5;
      max-width: 68%;
      word-break: break-word;
    }

    /* loading dots animation */
    .bubble.typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #999;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .bubble.typing span:nth-child(1) { animation-delay: 0s; }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── FOOTER ── */
    .chat-footer {
      background: #ffffff;
      padding: 16px 22px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      width: 100%;
      border: 1.5px solid #d0d0d0;
      border-radius: 50px;
      padding: 12px 52px 12px 22px;
      font-family: 'Lexend', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #1a1a1a;
      background: #f4f4f4;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 46px;
      line-height: 1.4;
    }

    .chat-input:focus {
      border-color: #b0b0b0;
      background: #fff;
    }

    .chat-input::placeholder {
      color: #b0b0b0;
      font-weight: 300;
    }

    .send-btn {
      position: absolute;
      right: 5px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2b2b2b;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #444;
    }

    .send-btn:active {
      transform: scale(0.93);
    }

    .send-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 17px;
      height: 17px;
      fill: #ffffff;
    }
  </style>
</head>
<body>

  <div class="chat-card">

    <!-- HEADER -->
    <div class="chat-header">
      <span class="title">Friday</span>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
      </div>
    </div>

    <!-- CHAT BODY -->
    <div class="chat-body" id="chatBody">
      <!-- pesan muncul di sini -->
    </div>

    <!-- FOOTER / INPUT -->
    <div class="chat-footer">
      <div class="input-wrapper">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="Ketik pesan..."
          autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" onclick="kirimPesan()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"
                  transform="rotate(-90 12 12)"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script>
    const chatBody  = document.getElementById('chatBody');
    const chatInput = document.getElementById('chatInput');
    const sendBtn   = document.getElementById('sendBtn');

    // ── kirim dengan Enter ──
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        kirimPesan();
      }
    });

    // ── tambah bubble ──
    function tambahBubble(teks, role) {
      const row    = document.createElement('div');
      row.className = `bubble-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = teks;

      row.appendChild(bubble);
      chatBody.appendChild(row);
      scrollBawah();
      return bubble;
    }

    // ── loading dots ──
    function tampilLoading() {
      const row    = document.createElement('div');
      row.className = 'bubble-row ai';
      row.id        = 'loadingRow';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(bubble);
      chatBody.appendChild(row);
      scrollBawah();
    }

    function hapusLoading() {
      const el = document.getElementById('loadingRow');
      if (el) el.remove();
    }

    // ── scroll ke bawah ──
    function scrollBawah() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    // ── kirim pesan ke backend ──
    async function kirimPesan() {
      const teks = chatInput.value.trim();
      if (!teks) return;

      // tampilkan bubble user
      tambahBubble(teks, 'user');
      chatInput.value = '';
      sendBtn.disabled = true;

      // loading indicator
      tampilLoading();

      try {
        const res = await fetch('http://127.0.0.1:8000/chat', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ pesan: teks }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        hapusLoading();
        tambahBubble(data.jawaban, 'ai');

      } catch (err) {
        hapusLoading();
        tambahBubble('Koneksi ke Friday gagal. Pastikan server berjalan.', 'ai');
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }
  </script>

</body>
</html>
